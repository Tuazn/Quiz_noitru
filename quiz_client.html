<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Quiz lâm sàng — Client v5.1</title>
<style>
:root {
  --bg-page: #FAFAF7;
  --bg-primary: #FFFFFF;
  --bg-secondary: #EFEDE5;
  --text-primary: #1A1A18;
  --text-secondary: #4A4A45;
  --text-tertiary: #6E6D68;
  --border-tertiary: rgba(0,0,0,0.14);
  --border-secondary: rgba(0,0,0,0.28);
  --info: #185FA5;
  --info-bg: #D6E7F7;
  --info-text: #042C53;
  --success: #1D7A5C;
  --success-bg: #C8E6B0;
  --success-border: #3B6D11;
  --success-text: #173404;
  --danger: #C62828;
  --danger-bg: #F7C1C1;
  --danger-border: #A32D2D;
  --danger-text: #501313;
  --warning: #BA7517;
  --warning-bg: #FAE0B8;
  --warning-text: #633806;
  --radius-md: 8px;
  --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-page: #1A1A18;
    --bg-primary: #242422;
    --bg-secondary: #2E2E2B;
    --text-primary: #F1EFE8;
    --text-secondary: #B4B2A9;
    --text-tertiary: #888780;
    --border-tertiary: rgba(255,255,255,0.14);
    --border-secondary: rgba(255,255,255,0.28);
    --info: #85B7EB;
    --info-bg: rgba(55,138,221,0.22);
    --info-text: #B5D4F4;
    --success: #97C459;
    --success-bg: rgba(99,153,34,0.28);
    --success-border: #97C459;
    --success-text: #C0DD97;
    --danger: #F09595;
    --danger-bg: rgba(226,75,74,0.25);
    --danger-border: #F09595;
    --danger-text: #F7C1C1;
    --warning: #EF9F27;
    --warning-bg: rgba(239,159,39,0.22);
    --warning-text: #FAC775;
  }
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem; }
.app-header { margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-tertiary); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
.app-title { font-size: 20px; font-weight: 600; margin: 0; }
.header-actions { display: flex; gap: 8px; }
button.btn { padding: 8px 16px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 500; transition: background 0.15s; }
button.btn:hover { background: var(--bg-secondary); }
button.btn-primary { background: var(--info); color: white; border-color: var(--info); }
button.btn-primary:hover { opacity: 0.92; background: var(--info); }
button.btn-danger { color: var(--danger); border-color: var(--danger); }
button.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Library view */
.library-empty { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); }
.library-empty-icon { font-size: 48px; margin-bottom: 1rem; }
.deck-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
.deck-card { background: var(--bg-primary); border: 1px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 14px 16px; cursor: pointer; transition: border-color 0.15s; }
.deck-card:hover { border-color: var(--border-secondary); }
.deck-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
.deck-name { font-size: 16px; font-weight: 600; margin: 0; flex: 1; }
.deck-meta { font-size: 12px; color: var(--text-tertiary); }
.deck-desc { font-size: 13px; color: var(--text-secondary); margin: 0 0 10px 0; }
.deck-actions { display: flex; gap: 6px; align-items: center; }
.deck-stats-mini { font-size: 12px; color: var(--text-tertiary); }

/* Import zone */
.import-zone { background: var(--bg-secondary); border: 2px dashed var(--border-secondary); border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; margin-bottom: 1.5rem; transition: border-color 0.15s; }
.import-zone.drag-over { border-color: var(--info); background: var(--info-bg); }
.import-zone-title { font-weight: 600; margin-bottom: 6px; }
.import-zone-hint { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
.import-buttons { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
#file-input { display: none; }

/* Quiz view */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
.stat { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; text-align: center; }
.stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
.stat-value { font-size: 22px; font-weight: 600; margin-top: 2px; }
.progress-wrap { height: 6px; background: var(--bg-secondary); border-radius: 999px; overflow: hidden; margin-bottom: 1.25rem; }
.progress-bar { height: 100%; background: var(--info); transition: width 0.4s ease; }
.case-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); }
.case-body { background: var(--warning-bg); border-left: 4px solid var(--warning); border-radius: 0 var(--radius-md) var(--radius-md) 0; padding: 14px 16px; margin-bottom: 1rem; font-size: 14px; line-height: 1.65; color: var(--text-primary); }
.case-title { font-weight: 600; margin-bottom: 6px; color: var(--warning-text); font-size: 14px; }
.dots { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; }
.dot { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border-secondary); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-secondary); background: var(--bg-primary); font-weight: 600; }
.dot.active { background: var(--info); color: white; border-color: var(--info); }
.dot.done-correct { background: var(--success); color: white; border-color: var(--success); }
.dot.done-wrong { background: var(--danger); color: white; border-color: var(--danger); }
.dot-line { flex: 1; height: 1px; background: var(--border-tertiary); }
.question { font-size: 15px; line-height: 1.6; margin-bottom: 14px; font-weight: 600; }
.options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
.option { display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; border: 1px solid var(--border-tertiary); border-radius: var(--radius-md); background: var(--bg-primary); cursor: pointer; text-align: left; font-size: 14px; line-height: 1.5; color: var(--text-primary); transition: all 0.15s; font-family: inherit; width: 100%; }
.option:hover:not(:disabled) { background: var(--bg-secondary); border-color: var(--border-secondary); }
.option:disabled { cursor: default; }
.option-letter { font-weight: 600; min-width: 18px; }
.option.correct { background: var(--success-bg); border: 2px solid var(--success-border); color: var(--success-text); font-weight: 500; }
.option.wrong { background: var(--danger-bg); border: 2px solid var(--danger-border); color: var(--danger-text); font-weight: 500; }
.option.selected { background: var(--info-bg); border: 2px solid var(--info); color: var(--info-text); }
.option.dim { opacity: 0.7; }
.explain { border-left: 4px solid var(--info); background: var(--info-bg); color: var(--info-text); padding: 12px 14px; border-radius: 0 var(--radius-md) var(--radius-md) 0; font-size: 13.5px; line-height: 1.6; margin-bottom: 1rem; }
.explain-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: var(--info); }
.actions { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 1rem; }
.final { text-align: center; padding: 2rem 1rem; }
.final-score { font-size: 56px; font-weight: 600; margin: 0.5rem 0; }
.final-label { font-size: 14px; color: var(--text-secondary); margin-bottom: 1rem; }
.final-msg { font-size: 15px; line-height: 1.6; max-width: 480px; margin: 0 auto 1.5rem; }
.final-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg-primary); border-radius: var(--radius-lg); max-width: 500px; width: 100%; padding: 1.25rem 1.5rem; max-height: 80vh; overflow-y: auto; }
.modal-title { font-size: 17px; font-weight: 600; margin: 0 0 8px 0; }
.modal-body { font-size: 14px; color: var(--text-secondary); margin-bottom: 1rem; line-height: 1.6; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal pre { background: var(--bg-secondary); padding: 10px; border-radius: var(--radius-md); font-size: 11.5px; overflow-x: auto; line-height: 1.5; }
.modal-textarea { width: 100%; min-height: 200px; padding: 10px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); background: var(--bg-page); color: var(--text-primary); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; line-height: 1.5; resize: vertical; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text-primary); color: var(--bg-primary); padding: 10px 18px; border-radius: var(--radius-md); font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; max-width: 90%; }
.toast.show { opacity: 0.95; }
.toast.error { background: var(--danger); color: white; }
.toast.success { background: var(--success); color: white; }

@media (max-width: 540px) {
  .container { padding: 1rem 0.75rem; }
  .stats { gap: 6px; } .stat { padding: 8px 6px; } .stat-value { font-size: 18px; }
  .app-title { font-size: 17px; }
}

/* Manage view */
.manage-section { background: var(--bg-primary); border: 1px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
.manage-section-title { font-size: 14px; font-weight: 600; margin: 0 0 12px 0; color: var(--text-primary); }
.form-row { margin-bottom: 12px; }
.form-label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
.form-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); background: var(--bg-page); color: var(--text-primary); font-size: 14px; font-family: inherit; }
.form-input:focus { outline: 2px solid var(--info); outline-offset: -1px; }
.case-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-page); border: 1px solid var(--border-tertiary); border-radius: var(--radius-md); margin-bottom: 6px; }
.case-item-num { font-size: 12px; color: var(--text-tertiary); min-width: 28px; font-weight: 600; }
.case-item-title { flex: 1; font-size: 13px; line-height: 1.4; }
.case-item-meta { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
.case-item-actions { display: flex; gap: 4px; }
.icon-btn { padding: 4px 8px; border: 1px solid var(--border-tertiary); border-radius: 6px; background: var(--bg-primary); color: var(--text-secondary); cursor: pointer; font-size: 13px; font-family: inherit; }
.icon-btn:hover:not(:disabled) { background: var(--bg-secondary); color: var(--text-primary); }
.icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.icon-btn.danger:hover:not(:disabled) { color: var(--danger); border-color: var(--danger); }
.shuffle-toggle { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); cursor: pointer; user-select: none; padding: 4px 8px; border: 1px solid var(--border-tertiary); border-radius: 6px; }
.shuffle-toggle input { margin: 0; cursor: pointer; }
.shuffle-toggle:hover { color: var(--text-primary); border-color: var(--border-secondary); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 1rem; border-bottom: 1px solid var(--border-tertiary); }
.tab { padding: 10px 16px; font-size: 14px; font-weight: 500; color: var(--text-secondary); background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--info); border-bottom-color: var(--info); }
.tab .badge { display: inline-block; background: var(--bg-secondary); color: var(--text-secondary); font-size: 11px; padding: 1px 6px; border-radius: 999px; margin-left: 6px; font-weight: 500; }
.tab.active .badge { background: var(--info); color: white; }

/* Search bar */
.search-bar { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }
.search-input { flex: 1; padding: 8px 12px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); background: var(--bg-page); color: var(--text-primary); font-size: 14px; font-family: inherit; }
.search-input:focus { outline: 2px solid var(--info); outline-offset: -1px; }
.search-clear { padding: 6px 10px; font-size: 12px; }

/* Breadcrumb */
.breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; font-size: 13px; color: var(--text-secondary); }
.breadcrumb a { color: var(--info); cursor: pointer; text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb-sep { color: var(--text-tertiary); }
.breadcrumb-current { color: var(--text-primary); font-weight: 500; }

/* Category grid */
.category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.category-card { background: var(--bg-primary); border: 1px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 18px 16px; cursor: pointer; transition: all 0.15s; text-align: center; }
.category-card:hover { border-color: var(--info); transform: translateY(-1px); }
.category-icon { font-size: 32px; margin-bottom: 8px; }
.category-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.category-count { font-size: 12px; color: var(--text-secondary); }

/* Search results header */
.search-results-info { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }

/* Progress badges on deck card */
.progress-badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 999px; background: var(--info-bg, #DBEAFE); color: var(--info, #1D4ED8); font-weight: 500; }
.best-score-badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 999px; background: var(--bg-secondary); color: var(--text-secondary); font-weight: 500; }
.deck-card.has-progress { border-left: 3px solid var(--info, #1D4ED8); }

/* Stats panel */
.stats-panel { background: var(--bg-primary); border: 1px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 1rem; cursor: pointer; transition: border-color 0.15s; max-width: 400px; }
.stats-panel:hover { border-color: var(--border-secondary); }
.stats-username { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.stats-edit-hint { font-size: 11px; color: var(--text-tertiary); margin-left: auto; font-weight: 400; }
.stats-row { display: flex; flex-wrap: wrap; gap: 12px 18px; font-size: 13px; color: var(--text-secondary); }
.stats-item { display: flex; align-items: center; gap: 4px; }
.stats-item b { color: var(--text-primary); font-weight: 600; }
.stats-streak { color: #F97316; }
.stats-streak b { color: #F97316; }
.stats-empty { font-size: 12px; color: var(--text-tertiary); font-style: italic; }

/* Leaderboard */
.lb-section { background: var(--bg-primary); border: 1px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 1rem; max-width: 600px; }
.lb-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.lb-title { font-size: 14px; font-weight: 600; }
.lb-updated { font-size: 11px; color: var(--text-tertiary); margin-left: auto; }
.lb-refresh { padding: 2px 8px !important; }
.lb-empty { padding: 6px 0; font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; flex-wrap: wrap; }
.lb-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.lb-table th { text-align: left; padding: 6px 8px; color: var(--text-tertiary); font-weight: 500; font-size: 12px; border-bottom: 1px solid var(--border-tertiary); }
.lb-table td { padding: 6px 8px; border-bottom: 1px solid var(--border-tertiary); }
.lb-table tr:last-child td { border-bottom: none; }
.lb-table tr.lb-me { background: rgba(29, 78, 216, 0.06); font-weight: 600; }
.lb-rank { width: 36px; text-align: center; }
.lb-name { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-streak { color: #F97316; white-space: nowrap; }
.lb-week, .lb-today { color: var(--text-secondary); white-space: nowrap; }
.lb-mgmt-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.lb-mgmt-table th { text-align: left; padding: 6px 8px; color: var(--text-tertiary); font-size: 12px; }
.lb-mgmt-table td { padding: 6px 8px; border-bottom: 1px solid var(--border-tertiary); }
.lb-mgmt-table code { background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; font-size: 12px; }



</style>
</head>
<body>

<div class="container">
  <div class="app-header">
    <h1 class="app-title" id="header-title">Thư viện bộ câu hỏi</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>
  <div id="main"></div>
</div>

<input type="file" id="file-input" accept=".json,application/json">

<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';

  const STORAGE_KEY = 'quiz_client_decks_v1';
  const USERNAME_KEY = 'quiz_client_username';
  const SESSIONS_KEY = 'quiz_client_sessions';
  const LB_CONFIG_KEY = 'quiz_client_lb_config';
  const CLOUD_URL_KEY = 'quiz_client_cloud_url';
  let decks = [];
  let view = 'library';
  let activeTab = 'cases';      // 'cases' | 'mcq'
  let activeCategory = null;     // null = show category list; string = inside that category
  let searchQuery = '';
  let activeDeckId = null;
  let qstate = null;

  // ─── Storage ──────────────────────────────────────────────────────
  function loadDecks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      decks = raw ? JSON.parse(raw) : [];
    } catch(e) { decks = []; }
  }
  function saveDecks() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(decks)); }
    catch(e) { toast('Không lưu được — bộ nhớ trình duyệt đầy?', 'error'); }
  }

  // ─── User & Sessions ──────────────────────────────────────────────
  function getUsername() {
    return localStorage.getItem(USERNAME_KEY) || '';
  }
  function setUsername(name) {
    localStorage.setItem(USERNAME_KEY, name);
  }
  function loadSessions() {
    try {
      const raw = localStorage.getItem(SESSIONS_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }
  function saveSession(deckId, deckName, score, totalQ, correct) {
    const sessions = loadSessions();
    sessions.push({
      deckId, deckName, score, totalQ, correct,
      finishedAt: Date.now()
    });
    const cutoff = Date.now() - 365 * 24 * 60 * 60 * 1000;
    const trimmed = sessions.filter(s => s.finishedAt > cutoff);
    try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(trimmed)); } catch(e) {}
  }

  function dateKey(timestamp) {
    const d = new Date(timestamp);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function computeStats() {
    const sessions = loadSessions();
    const today = dateKey(Date.now());
    const todaySessions = sessions.filter(s => dateKey(s.finishedAt) === today);
    const todayDecks = todaySessions.length;
    const todayQuestions = todaySessions.reduce((sum, s) => sum + s.totalQ, 0);

    const dayHasSession = new Set(sessions.map(s => dateKey(s.finishedAt)));
    let streak = 0;
    let cursor = new Date();
    cursor.setHours(0, 0, 0, 0);
    if (!dayHasSession.has(dateKey(cursor.getTime()))) {
      cursor.setDate(cursor.getDate() - 1);
    }
    while (dayHasSession.has(dateKey(cursor.getTime()))) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }

    const weekCutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
    const weekSessions = sessions.filter(s => s.finishedAt > weekCutoff);
    const weekDecks = weekSessions.length;
    const weekAvgScore = weekSessions.length > 0
      ? Math.round(weekSessions.reduce((sum, s) => sum + s.score, 0) / weekSessions.length)
      : null;

    return { todayDecks, todayQuestions, streak, weekDecks, weekAvgScore };
  }

  // ─── Toast & Modal ─────────────────────────────────────────────────
  // ─── Leaderboard ──────────────────────────────────────────────────
  // Owner can export a customized client with embedded config (token/owner/repo)
  // baked in. When EMBEDDED_LB_CONFIG exists, members only need to enter a 6-char
  // join code + their display name to join the leaderboard.
  // EMBEDDED_LB_CONFIG_PLACEHOLDER — replaced by exporter
  const EMBEDDED_LB_CONFIG = null;
  // Config: { token, owner, repo, displayName, isOwner, joinedAt }
  // Repo files: leaderboard.json (all users' stats) + invites.json (join codes)
  // Push triggered: on deck finish + every 5min while in library
  function loadLBConfig() {
    try {
      const raw = localStorage.getItem(LB_CONFIG_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }
  function saveLBConfig(cfg) {
    if (cfg) localStorage.setItem(LB_CONFIG_KEY, JSON.stringify(cfg));
    else localStorage.removeItem(LB_CONFIG_KEY);
  }

  // GitHub helpers (return { content, sha } for read; { sha } for write)
  async function lbReadFile(cfg, path) {
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    const headers = {
      'Authorization': 'Bearer ' + cfg.token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };
    let res;
    try {
      res = await fetch(url + '?ref=main&t=' + Date.now(), { headers, cache: 'no-store' });
    } catch(e) {
      // Network-level failure (DNS, CORS, offline, etc.)
      throw new Error('Không kết nối được GitHub. Kiểm tra mạng / extension chặn? Chi tiết: ' + e.message);
    }
    if (res.status === 404) return { content: null, sha: null };
    if (res.status === 401) throw new Error('Token không hợp lệ hoặc hết hạn (401). Tạo token mới và thử lại.');
    if (res.status === 403) {
      const body = await res.text();
      if (body.includes('rate limit')) throw new Error('GitHub rate limit (403). Đợi 1 giờ rồi thử lại.');
      throw new Error('Không có quyền truy cập (403). Kiểm tra: token có scope "Contents: Read+Write" cho repo này không?');
    }
    if (!res.ok) {
      const body = await res.text();
      throw new Error('GitHub API ' + res.status + ': ' + body.substring(0, 200));
    }
    const data = await res.json();
    const decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    return { content: JSON.parse(decoded), sha: data.sha };
  }

  async function lbWriteFile(cfg, path, content, sha, message) {
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    const headers = {
      'Authorization': 'Bearer ' + cfg.token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json'
    };
    const body = JSON.stringify({
      message: message,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
      sha: sha || undefined,
      branch: 'main'
    });
    let res;
    try {
      res = await fetch(url, { method: 'PUT', headers, body });
    } catch(e) {
      throw new Error('Không kết nối được GitHub. Kiểm tra mạng. Chi tiết: ' + e.message);
    }
    if (res.status === 409 || res.status === 422) {
      const err = new Error('CONFLICT');
      err.code = 'CONFLICT';
      throw err;
    }
    if (res.status === 401) throw new Error('Token không hợp lệ hoặc hết hạn (401).');
    if (res.status === 403) throw new Error('Không có quyền ghi (403). Token cần scope "Contents: Read+Write".');
    if (res.status === 404) throw new Error('Repo hoặc branch không tồn tại (404). Kiểm tra owner/repo có đúng không, repo có branch "main" không.');
    if (!res.ok) {
      const body = await res.text();
      throw new Error('GitHub API ' + res.status + ': ' + body.substring(0, 200));
    }
    return await res.json();
  }

  // Atomic update with optimistic locking and retry
  async function lbAtomicUpdate(cfg, path, mutator, message, maxRetries = 3) {
    let lastErr;
    for (let attempt = 0; attempt < maxRetries; attempt++) {
      try {
        const { content, sha } = await lbReadFile(cfg, path);
        const newContent = mutator(content);
        await lbWriteFile(cfg, path, newContent, sha, message);
        return newContent;
      } catch(e) {
        lastErr = e;
        if (e.code !== 'CONFLICT') throw e;
        // Wait a bit then retry
        await new Promise(r => setTimeout(r, 300 + Math.random() * 500));
      }
    }
    throw lastErr;
  }

  // Generate a 6-char join code
  function genJoinCode() {
    const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // exclude confusing chars
    let code = '';
    for (let i = 0; i < 6; i++) {
      code += alphabet[Math.floor(Math.random() * alphabet.length)];
    }
    return code;
  }

  // Push our stats to leaderboard
  async function lbPushStats() {
    const cfg = loadLBConfig();
    if (!cfg) return;
    const username = getUsername();
    if (!username) return;
    const stats = computeStats();
    const userKey = (cfg.displayName || username).toLowerCase().replace(/[^\w]/g, '_');
    try {
      await lbAtomicUpdate(cfg, 'leaderboard.json', (lb) => {
        if (!lb) lb = { version: 1, updatedAt: 0, users: {} };
        if (!lb.users) lb.users = {};
        lb.users[userKey] = {
          displayName: cfg.displayName || username,
          lastActive: Date.now(),
          stats: {
            streak: stats.streak,
            weekDecks: stats.weekDecks,
            weekAvgScore: stats.weekAvgScore || 0,
            todayDecks: stats.todayDecks,
            todayQuestions: stats.todayQuestions
          }
        };
        lb.updatedAt = Date.now();
        return lb;
      }, `Update stats: ${cfg.displayName || username}`);
      return true;
    } catch(e) {
      console.error('Leaderboard push failed:', e);
      return false;
    }
  }

  // Owner: create new invite code
  async function lbCreateInvite(label) {
    const cfg = loadLBConfig();
    if (!cfg || !cfg.isOwner) throw new Error('Chỉ owner mới có thể tạo mã mời');
    const code = genJoinCode();
    await lbAtomicUpdate(cfg, 'invites.json', (inv) => {
      if (!inv) inv = { version: 1, codes: [] };
      if (!inv.codes) inv.codes = [];
      inv.codes.push({
        code: code,
        label: label || '',
        createdAt: Date.now(),
        usedBy: null
      });
      return inv;
    }, `Add invite code: ${code}`);
    return code;
  }

  // Verify a join code (read-only for member during join, then mark used)
  // Member uses owner's token (provided by owner via separate channel) to verify and mark used
  async function lbVerifyAndUseCode(token, owner, repo, code, displayName) {
    const tempCfg = { token, owner, repo };
    let inv;
    try {
      const result = await lbReadFile(tempCfg, 'invites.json');
      inv = result.content;
    } catch(e) {
      throw new Error('Không đọc được file invites: ' + e.message);
    }
    if (!inv || !Array.isArray(inv.codes)) throw new Error('File invites không hợp lệ');
    const entry = inv.codes.find(c => c.code === code.toUpperCase());
    if (!entry) throw new Error('Mã mời không hợp lệ');
    if (entry.usedBy) throw new Error('Mã đã được dùng bởi: ' + entry.usedBy);
    // Mark code as used
    try {
      await lbAtomicUpdate(tempCfg, 'invites.json', (inv2) => {
        const e2 = inv2.codes.find(c => c.code === code.toUpperCase());
        if (e2 && !e2.usedBy) {
          e2.usedBy = displayName;
          e2.usedAt = Date.now();
        }
        return inv2;
      }, `Code ${code} used by ${displayName}`);
    } catch(e) {
      throw new Error('Không cập nhật được invites: ' + e.message);
    }
    return true;
  }

  // Fetch leaderboard.json (no auth needed if repo public)
  async function lbFetchLeaderboard() {
    const cfg = loadLBConfig();
    if (!cfg) return null;
    try {
      const url = `https://${cfg.owner}.github.io/${cfg.repo}/leaderboard.json?t=${Date.now()}`;
      const res = await fetch(url, { cache: 'no-cache' });
      if (!res.ok) {
        // Fallback: use API (works for private repo too)
        const api = await lbReadFile(cfg, 'leaderboard.json');
        return api.content;
      }
      return await res.json();
    } catch(e) {
      console.error('Fetch leaderboard failed:', e);
      return null;
    }
  }

  // Render leaderboard panel in library
  function renderLeaderboardSection(lbData) {
    const cfg = loadLBConfig();
    if (!cfg) {
      // Not joined yet — show invite prompt
      return `
        <div class="lb-section">
          <div class="lb-empty">
            <span style="font-size: 13px; color: var(--text-secondary);">🏆 Chưa tham gia bảng học tập</span>
            <button class="btn btn-sm" id="lb-join-btn" style="margin-left: 8px;">Tham gia</button>
            <button class="btn btn-sm" id="lb-create-btn" style="margin-left: 4px;">Tạo bảng</button>
          </div>
        </div>
      `;
    }

    if (!lbData || !lbData.users || Object.keys(lbData.users).length === 0) {
      return `
        <div class="lb-section">
          <div class="lb-header">
            <span class="lb-title">🏆 Bảng học tập</span>
            <button class="btn btn-sm lb-refresh" id="lb-refresh-btn" title="Làm mới">↻</button>
            ${cfg.isOwner ? '<button class="btn btn-sm" id="lb-manage-btn" title="Quản lý">⚙</button>' : ''}
          </div>
          <div class="lb-empty"><i style="font-size: 12px; color: var(--text-tertiary);">Chưa có ai tham gia</i></div>
        </div>
      `;
    }

    // Sort users: streak desc, weekDecks desc, then displayName
    const users = Object.values(lbData.users);
    users.sort((a, b) => {
      const sa = (a.stats && a.stats.streak) || 0;
      const sb = (b.stats && b.stats.streak) || 0;
      if (sa !== sb) return sb - sa;
      const wa = (a.stats && a.stats.weekDecks) || 0;
      const wb = (b.stats && b.stats.weekDecks) || 0;
      if (wa !== wb) return wb - wa;
      return (a.displayName || '').localeCompare(b.displayName || '');
    });

    const myKey = (cfg.displayName || getUsername() || '').toLowerCase().replace(/[^\w]/g, '_');
    const updatedAgo = lbData.updatedAt
      ? formatTimeAgo(Date.now() - lbData.updatedAt)
      : '';

    let rows = '';
    users.forEach((u, idx) => {
      const rank = idx + 1;
      const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : ` ${rank}`;
      const userKey = (u.displayName || '').toLowerCase().replace(/[^\w]/g, '_');
      const isMe = userKey === myKey;
      const stats = u.stats || {};
      const streakStr = stats.streak > 0 ? `🔥 ${stats.streak}` : '—';
      const weekStr = stats.weekDecks > 0 ? `${stats.weekDecks}` : '—';
      const todayStr = stats.todayDecks > 0
        ? `✓ ${stats.todayDecks}`
        : (u.lastActive ? formatTimeAgo(Date.now() - u.lastActive) : '—');
      rows += `
        <tr class="${isMe ? 'lb-me' : ''}">
          <td class="lb-rank">${medal}</td>
          <td class="lb-name">${escapeHtml(u.displayName || '?')}${isMe ? ' (tôi)' : ''}</td>
          <td class="lb-streak">${streakStr}</td>
          <td class="lb-week">${weekStr}</td>
          <td class="lb-today">${todayStr}</td>
        </tr>
      `;
    });

    return `
      <div class="lb-section">
        <div class="lb-header">
          <span class="lb-title">🏆 Bảng học tập</span>
          <span class="lb-updated" title="Cập nhật cuối">${updatedAgo}</span>
          <button class="btn btn-sm lb-refresh" id="lb-refresh-btn" title="Làm mới">↻</button>
          ${cfg.isOwner ? '<button class="btn btn-sm" id="lb-manage-btn" title="Quản lý">⚙</button>' : ''}
        </div>
        <table class="lb-table">
          <thead>
            <tr><th>#</th><th>Tên</th><th>Streak</th><th>Tuần</th><th>Hôm nay</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  function formatTimeAgo(ms) {
    if (ms < 60000) return 'vừa xong';
    if (ms < 3600000) return Math.floor(ms / 60000) + 'p trước';
    if (ms < 86400000) return Math.floor(ms / 3600000) + 'h trước';
    return Math.floor(ms / 86400000) + 'd trước';
  }

  // ─── Deck validation ──────────────────────────────────────────────
  function validateQuestion(q, ctx) {
    if (!q.q) throw new Error(ctx+' thiếu "q".');
    if (!Array.isArray(q.options) || q.options.length < 2) throw new Error(ctx+' thiếu "options" (cần ≥ 2).');
    if (!q.explain) throw new Error(ctx+' thiếu "explain".');
    const isMulti = q.type === 'multi';
    if (isMulti) {
      if (!Array.isArray(q.answer) || q.answer.length === 0) throw new Error(ctx+' "answer" phải là mảng các chỉ số (không rỗng) cho câu multi.');
      const seen = new Set();
      q.answer.forEach(a => {
        if (typeof a !== 'number' || a < 0 || a >= q.options.length) throw new Error(ctx+' "answer" chứa chỉ số không hợp lệ: '+a);
        if (seen.has(a)) throw new Error(ctx+' "answer" có chỉ số trùng: '+a);
        seen.add(a);
      });
    } else {
      if (typeof q.answer !== 'number' || q.answer < 0 || q.answer >= q.options.length) throw new Error(ctx+' "answer" không hợp lệ.');
    }
  }
  function validateDeck(d) {
    if (!d || typeof d !== 'object') throw new Error('File không hợp lệ — phải là object JSON.');
    if (!d.name || typeof d.name !== 'string') throw new Error('Thiếu trường "name" (tên bộ đề).');
    // Determine deck type — default to 'cases' for backward compatibility
    const deckType = d.type || (Array.isArray(d.questions) ? 'mcq' : 'cases');
    if (deckType === 'mcq') {
      if (!Array.isArray(d.questions) || d.questions.length === 0) {
        throw new Error('Bộ MCQ phải có mảng "questions" (không rỗng) ở cấp đầu.');
      }
      d.questions.forEach((q, qi) => validateQuestion(q, 'Câu '+(qi+1)));
    } else if (deckType === 'cases') {
      if (!Array.isArray(d.cases) || d.cases.length === 0) throw new Error('Thiếu mảng "cases" hoặc rỗng.');
      d.cases.forEach((c, ci) => {
        if (!c.title) throw new Error('Case '+(ci+1)+' thiếu "title".');
        if (!c.body) throw new Error('Case '+(ci+1)+' thiếu "body".');
        if (!Array.isArray(c.questions) || c.questions.length === 0) throw new Error('Case '+(ci+1)+' thiếu "questions".');
        c.questions.forEach((q, qi) => validateQuestion(q, 'Case '+(ci+1)+' câu '+(qi+1)));
      });
    } else {
      throw new Error('Trường "type" không hợp lệ: phải là "cases" hoặc "mcq".');
    }
    return true;
  }

  function importDeckObj(obj, categoryOverride) {
    validateDeck(obj);
    const id = 'd_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
    const deckType = obj.type || (Array.isArray(obj.questions) ? 'mcq' : 'cases');
    let totalQ;
    if (deckType === 'mcq') {
      totalQ = obj.questions.length;
    } else {
      totalQ = obj.cases.reduce((s,c)=>s+c.questions.length,0);
    }
    const category = (categoryOverride || obj.category || '').trim() || 'Chưa phân loại';
    const deck = {
      id,
      name: obj.name,
      description: obj.description || '',
      level: obj.level || '',
      type: deckType,
      category: category,
      totalQuestions: totalQ,
      addedAt: Date.now(),
      bestScore: null
    };
    if (deckType === 'mcq') deck.questions = obj.questions;
    else deck.cases = obj.cases;
    // Check duplicate name
    const existing = decks.findIndex(d => d.name === deck.name);
    if (existing >= 0) {
      if (confirm('Bộ đề "'+deck.name+'" đã tồn tại. Ghi đè?')) {
        // preserve category if not overridden
        if (!categoryOverride && !obj.category) deck.category = decks[existing].category || category;
        decks[existing] = deck;
      } else return;
    } else {
      decks.push(deck);
    }
    saveDecks();
    toast('Đã thêm bộ đề: '+deck.name, 'success');
    renderLibrary();
  }

  function importFromText(text, categoryOverride) {
    let obj;
    try { obj = JSON.parse(text); }
    catch(e) { toast('JSON không hợp lệ: '+e.message, 'error'); return; }
    try { importDeckObj(obj, categoryOverride); }
    catch(e) { toast('Lỗi: '+e.message, 'error'); }
  }

  function importFromFile(file, categoryOverride) {
    const reader = new FileReader();
    reader.onload = e => importFromText(e.target.result, categoryOverride);
    reader.onerror = () => toast('Không đọc được file', 'error');
    reader.readAsText(file);
  }

  async function syncFromCloud(manifestUrl, replace, progress) {
    progress('Đang tải manifest...');
    let manifest;
    try {
      const res = await fetch(manifestUrl, { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP '+res.status);
      manifest = await res.json();
    } catch(e) {
      throw new Error('Không tải được manifest: ' + e.message);
    }
    if (!manifest || !Array.isArray(manifest.decks) || manifest.decks.length === 0) {
      throw new Error('Manifest không hợp lệ — phải có mảng "decks"');
    }
    const baseUrl = new URL(manifestUrl, window.location.href);
    const manifestNames = new Set(manifest.decks.map(d => d.name));
    let added = 0, updated = 0, skipped = 0, failed = 0, removed = 0;
    for (let i = 0; i < manifest.decks.length; i++) {
      const item = manifest.decks[i];
      progress(`Đang tải ${i+1}/${manifest.decks.length}: ${item.name || item.url}...`);
      try {
        const deckUrl = new URL(item.url, baseUrl).href;
        const res = await fetch(deckUrl, { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP '+res.status);
        const deckObj = await res.json();
        validateDeck(deckObj);
        const existingIdx = decks.findIndex(d => d.name === deckObj.name);
        if (existingIdx >= 0 && !replace) { skipped++; continue; }
        const id = existingIdx >= 0 ? decks[existingIdx].id : ('d_' + Date.now() + '_' + Math.random().toString(36).slice(2,7));
        const deckType = deckObj.type || (Array.isArray(deckObj.questions) ? 'mcq' : 'cases');
        const totalQ = deckType === 'mcq'
          ? deckObj.questions.length
          : deckObj.cases.reduce((s,c)=>s+c.questions.length,0);
        // Preserve user's existing category if cloud deck doesn't specify one
        const cloudCategory = (deckObj.category || '').trim();
        const preservedCategory = existingIdx >= 0 ? decks[existingIdx].category : null;
        const finalCategory = cloudCategory || preservedCategory || 'Chưa phân loại';
        const newDeck = {
          id, name: deckObj.name,
          description: deckObj.description || '',
          level: deckObj.level || '',
          type: deckType,
          category: finalCategory,
          totalQuestions: totalQ,
          addedAt: existingIdx >= 0 ? decks[existingIdx].addedAt : Date.now(),
          bestScore: existingIdx >= 0 ? decks[existingIdx].bestScore : null,
          source: 'cloud'
        };
        if (deckType === 'mcq') newDeck.questions = deckObj.questions;
        else newDeck.cases = deckObj.cases;
        // Preserve in-progress session unless the deck content actually changed
        if (existingIdx >= 0 && decks[existingIdx].progress) {
          // If content (questions/cases) changed → progress is invalid
          const oldContent = JSON.stringify(decks[existingIdx].type === 'mcq' ? decks[existingIdx].questions : decks[existingIdx].cases);
          const newContent = JSON.stringify(deckType === 'mcq' ? newDeck.questions : newDeck.cases);
          if (oldContent === newContent) {
            newDeck.progress = decks[existingIdx].progress;
          }
        }
        if (existingIdx >= 0) { decks[existingIdx] = newDeck; updated++; }
        else { decks.push(newDeck); added++; }
      } catch(e) {
        failed++;
        console.error('Failed to load', item, e);
      }
    }
    // Remove cloud-sourced decks no longer in manifest (cloud is the source of truth)
    // Only when replace=true (full sync); skip when user is just adding new ones
    if (replace) {
      const before = decks.length;
      decks = decks.filter(d => {
        // Keep decks not from cloud (manually added / kept locally)
        if (d.source !== 'cloud') return true;
        // Keep cloud decks still in manifest
        return manifestNames.has(d.name);
      });
      removed = before - decks.length;
    }
    saveDecks();
    const summary = [];
    if (added) summary.push(added+' bộ mới');
    if (updated) summary.push(updated+' cập nhật');
    if (skipped) summary.push(skipped+' đã có (bỏ qua)');
    if (removed) summary.push(removed+' đã xoá (không còn trên cloud)');
    if (failed) summary.push(failed+' lỗi');
    progress(summary.join(' · ') || 'Không có thay đổi');
  }

  function slugify(s) {
    return String(s)
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // remove diacritics
      .replace(/đ/g, 'd').replace(/Đ/g, 'D')
      .replace(/[^\w\s-]/g, '')
      .trim().replace(/\s+/g, '_').toLowerCase()
      .substring(0, 60) || 'deck';
  }

  async function ghRequest(cfg, path, method, body) {
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    const headers = {
      'Authorization': 'Bearer ' + cfg.token,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };
    const opts = { method, headers };
    if (body) {
      opts.body = JSON.stringify(body);
      headers['Content-Type'] = 'application/json';
    }
    const res = await fetch(url, opts);
    if (res.status === 404 && method === 'GET') return null; // file doesn't exist yet
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`GitHub API ${res.status}: ${errBody.substring(0, 200)}`);
    }
    return res.json();
  }

  // Base64-encode a UTF-8 string (handles unicode correctly)
  function b64encode(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }

  async function pushFile(cfg, path, content, commitMsg, progress) {
    // Get existing SHA if file exists (required for updates)
    progress(`  → Kiểm tra ${path}...`);
    const existing = await ghRequest(cfg, path + '?ref=' + cfg.branch, 'GET');
    const body = {
      message: commitMsg,
      content: b64encode(content),
      branch: cfg.branch
    };
    if (existing && existing.sha) body.sha = existing.sha;
    progress(`  → ${existing ? 'Cập nhật' : 'Tạo mới'} ${path}...`);
    await ghRequest(cfg, path, 'PUT', body);
  }

  async function pushToGitHub(cfg, progress) {
    progress('Bắt đầu đẩy lên GitHub...');
    const folderPrefix = cfg.folder ? cfg.folder + '/' : '';
    const usedSlugs = new Set();
    const manifest = { decks: [] };

    // Generate unique slug filenames for each deck
    const deckFiles = decks.map(d => {
      let slug = slugify(d.name);
      let candidate = slug;
      let n = 2;
      while (usedSlugs.has(candidate)) candidate = slug + '_' + (n++);
      usedSlugs.add(candidate);
      return { deck: d, filename: candidate + '.json' };
    });

    // Push each deck as its own JSON file
    for (let i = 0; i < deckFiles.length; i++) {
      const { deck, filename } = deckFiles[i];
      progress(`<b>${i+1}/${deckFiles.length}</b> ${escapeHtml(deck.name)}`);
      const isMcq = (deck.type || 'cases') === 'mcq';
      const exportObj = {
        name: deck.name,
        description: deck.description,
        level: deck.level,
        type: deck.type || 'cases',
        category: deck.category || 'Chưa phân loại'
      };
      if (isMcq) exportObj.questions = deck.questions;
      else exportObj.cases = deck.cases;
      await pushFile(cfg, folderPrefix + filename, JSON.stringify(exportObj, null, 2), `Update ${deck.name}`, progress);
      manifest.decks.push({ name: deck.name, url: filename });
    }

    // Push manifest last
    progress(`<b>Manifest</b>`);
    await pushFile(cfg, folderPrefix + 'manifest.json', JSON.stringify(manifest, null, 2), 'Update manifest', progress);
  }

  function getCategoryIcon(cat) {
    const lower = cat.toLowerCase();
    if (lower.includes('nội')) return '🩺';
    if (lower.includes('ngoại')) return '🔬';
    if (lower.includes('sản') || lower.includes('phụ khoa')) return '🤰';
    if (lower.includes('nhi')) return '👶';
    if (lower.includes('cơ sở') || lower.includes('sinh lý') || lower.includes('giải phẫu')) return '📚';
    if (lower.includes('cấp cứu') || lower.includes('hồi sức')) return '🚑';
    if (lower.includes('da') || lower.includes('liễu')) return '🧴';
    if (lower.includes('tâm thần')) return '🧠';
    if (lower.includes('mắt')) return '👁️';
    if (lower.includes('tai mũi họng') || lower.includes('tmh')) return '👂';
    if (lower.includes('răng')) return '🦷';
    if (lower.includes('truyền nhiễm')) return '🦠';
    if (lower.includes('chưa phân loại')) return '📂';
    return '📁';
  }

  function getDecksForTab(tab) {
    return decks.filter(d => (d.type || 'cases') === tab);
  }

  function getCategoriesForTab(tab) {
    const tabDecks = getDecksForTab(tab);
    const map = new Map();
    tabDecks.forEach(d => {
      const cat = d.category || 'Chưa phân loại';
      if (!map.has(cat)) map.set(cat, 0);
      map.set(cat, map.get(cat) + 1);
    });
    return Array.from(map.entries()).map(([name, count]) => ({ name, count }))
      .sort((a, b) => {
        if (a.name === 'Chưa phân loại') return 1;
        if (b.name === 'Chưa phân loại') return -1;
        return a.name.localeCompare(b.name, 'vi');
      });
  }

  function matchesSearch(d, q) {
    if (!q) return true;
    const lower = q.toLowerCase();
    return (d.name || '').toLowerCase().includes(lower)
        || (d.description || '').toLowerCase().includes(lower)
        || (d.category || '').toLowerCase().includes(lower);
  }

  function renderStatsPanel() {
    const username = getUsername();
    if (!username) return '';
    const stats = computeStats();
    const todayLine = stats.todayDecks > 0
      ? `<div class="stats-item">📅 Hôm nay: <b>${stats.todayDecks}</b> bộ · <b>${stats.todayQuestions}</b> câu</div>`
      : `<div class="stats-item"><span class="stats-empty">📅 Hôm nay chưa làm bộ nào</span></div>`;
    const streakLine = stats.streak > 0
      ? `<div class="stats-item stats-streak">🔥 Streak: <b>${stats.streak}</b> ngày</div>`
      : '';
    const weekLine = stats.weekDecks > 0
      ? `<div class="stats-item">📊 Tuần này: <b>${stats.weekDecks}</b> bộ · <b>${stats.weekAvgScore}%</b></div>`
      : '';
    return `
      <div class="stats-panel" id="stats-panel" title="Nhấn để đổi tên">
        <div class="stats-username">
          👤 ${escapeHtml(username)}
          <span class="stats-edit-hint">(nhấn để đổi tên)</span>
        </div>
        <div class="stats-row">
          ${todayLine}
          ${streakLine}
          ${weekLine}
        </div>
      </div>
    `;
  }

  function openUsernameModal(isFirstTime) {
    const current = getUsername();
    openModal(`
      <h2 class="modal-title">${isFirstTime ? '👋 Chào mừng!' : '✏️ Đổi tên'}</h2>
      <div class="modal-body">
        ${isFirstTime
          ? 'Nhập tên của bạn để bắt đầu. Tên này chỉ lưu trên thiết bị này.'
          : 'Tên này chỉ lưu trên thiết bị này.'}
      </div>
      <div class="form-row">
        <input type="text" class="form-input" id="username-input" value="${escapeHtml(current)}" placeholder="Tên của bạn..." maxlength="40">
      </div>
      <div class="modal-actions">
        ${isFirstTime ? '' : '<button class="btn" id="username-cancel">Huỷ</button>'}
        <button class="btn btn-primary" id="username-save">Lưu</button>
      </div>
    `);
    const input = document.getElementById('username-input');

      document.getElementById('username-cancel').onclick = closeModal;
    }
    document.getElementById('username-save').onclick = () => {

  function renderLibrary() {
    view = 'library';
    document.getElementById('header-title').textContent = 'Thư viện bộ câu hỏi';
    document.getElementById('header-actions').innerHTML = `
      <button class="btn btn-primary btn-sm" id="cloud-sync">☁ Đồng bộ</button>
    `;
    document.getElementById('cloud-sync').onclick = openCloudSyncModal;

    const main = document.getElementById('main');
    const casesCount = getDecksForTab('cases').length;
    const mcqCount = getDecksForTab('mcq').length;

    // Stats panel (only if username is set)
    let html = renderStatsPanel();

    // Leaderboard section
    html += renderLeaderboardSection(lbCache);

    // Tabs (always visible)
    html += `
      <div class="tabs">
        <button class="tab ${activeTab === 'cases' ? 'active' : ''}" data-tab="cases">
          📋 Case lâm sàng <span class="badge">${casesCount}</span>
        </button>
        <button class="tab ${activeTab === 'mcq' ? 'active' : ''}" data-tab="mcq">
          ❓ MCQ <span class="badge">${mcqCount}</span>
        </button>
      </div>
    `;

    // Search bar
    html += `
      <div class="search-bar">
        <input type="text" class="search-input" id="search-input" placeholder="🔍 Tìm kiếm theo tên bộ đề, mô tả, danh mục..." value="${escapeHtml(searchQuery)}">
        ${searchQuery ? '<button class="btn btn-sm search-clear" id="search-clear">✕</button>' : ''}
      </div>
    `;

    if (searchQuery) {
      // SEARCH MODE: show all matching decks across categories
      html += renderSearchResults();
    } else if (activeCategory === null) {
      // CATEGORY LIST MODE
      html += renderCategoryList();
    } else {
      // INSIDE A CATEGORY
      html += renderCategoryContents();
    }

    main.innerHTML = html;
    bindLibraryEvents();
  }

  function renderCategoryList() {
    const categories = getCategoriesForTab(activeTab);
    if (categories.length === 0) {
      return `
        <div class="library-empty">
          <div class="library-empty-icon">${activeTab === 'cases' ? '📋' : '❓'}</div>
          <div style="font-size: 15px; font-weight: 600; margin-bottom: 8px;">
            Chưa có bộ ${activeTab === 'cases' ? 'case lâm sàng' : 'MCQ'} nào
          </div>
          <div style="font-size: 13px; color: var(--text-secondary);">
            Nhấn nút <b>☁ Đồng bộ</b> ở góc trên để tải bộ đề từ cloud về.
          </div>
        </div>
      `;
    }
    let html = '<div class="category-grid">';
    categories.forEach(c => {
      html += `
        <div class="category-card" data-category="${escapeHtml(c.name)}">
          <div class="category-icon">${getCategoryIcon(c.name)}</div>
          <div class="category-name">${escapeHtml(c.name)}</div>
          <div class="category-count">${c.count} bộ đề</div>
        </div>
      `;
    });
    html += '</div>';
    return html;
  }

  function renderCategoryContents() {
    const tabDecks = getDecksForTab(activeTab);
    const categoryDecks = tabDecks.filter(d => (d.category || 'Chưa phân loại') === activeCategory);

    let html = `
      <div class="breadcrumb">
        <a id="back-to-categories">← Tất cả danh mục</a>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current">${getCategoryIcon(activeCategory)} ${escapeHtml(activeCategory)}</span>
      </div>
    `;

    if (categoryDecks.length === 0) {
      html += `
        <div class="library-empty">
          <div style="font-size: 13px;">Danh mục này chưa có bộ đề nào.</div>
        </div>
      `;
    } else {
      html += '<div class="deck-list">';
      categoryDecks.sort((a,b) => b.addedAt - a.addedAt).forEach(d => {
        html += renderDeckCard(d);
      });
      html += '</div>';
    }
    return html;
  }

  function renderSearchResults() {
    const tabDecks = getDecksForTab(activeTab);
    const matches = tabDecks.filter(d => matchesSearch(d, searchQuery))
      .sort((a,b) => b.addedAt - a.addedAt);
    let html = `<div class="search-results-info">Tìm thấy <b>${matches.length}</b> kết quả cho "${escapeHtml(searchQuery)}" trong tab ${activeTab === 'cases' ? 'Case lâm sàng' : 'MCQ'}</div>`;
    if (matches.length === 0) {
      html += `<div class="library-empty"><div style="font-size: 13px;">Không có kết quả phù hợp.</div></div>`;
    } else {
      html += '<div class="deck-list">';
      matches.forEach(d => { html += renderDeckCard(d, true); });
      html += '</div>';
    }
    return html;
  }

  function renderDeckCard(d, showCategory) {
    const isCases = (d.type || 'cases') === 'cases';
    const countLabel = isCases
      ? `${d.cases.length} case · ${d.totalQuestions} câu`
      : `${d.totalQuestions} câu`;

    let statsHTML = '';
    const hasProgress = d.progress && !d.progress.finished
      && d.progress.runtimeCases && d.progress.done > 0;
    if (hasProgress) {
      const totalQ = d.progress.runtimeCases.reduce((s,c)=>s+c.questions.length, 0);
      const pct = Math.round(100 * d.progress.done / totalQ);
      statsHTML += `<span class="progress-badge" title="Đang làm dở">📍 Đang làm: ${pct}%</span>`;
    }
    if (d.bestScore != null) {
      statsHTML += `<span class="best-score-badge">Điểm cao: ${d.bestScore}%</span>`;
    }
    if (!hasProgress && d.bestScore == null) {
      statsHTML = '<span class="deck-stats-mini">Chưa làm</span>';
    }

    const catBadge = showCategory && d.category
      ? `<span style="font-size: 11px; color: var(--text-tertiary); margin-right: 8px;">${getCategoryIcon(d.category)} ${escapeHtml(d.category)}</span>`
      : '';
    const shuffleChecked = hasProgress ? (d.progress.shuffle ? 'checked' : '') : 'checked';
    const startLabel = hasProgress ? '▶ Tiếp tục' : 'Bắt đầu';

    return `
      <div class="deck-card${hasProgress ? ' has-progress' : ''}" data-id="${d.id}">
        <div class="deck-card-top">
          <h3 class="deck-name">${escapeHtml(d.name)}</h3>
          <div class="deck-meta">${catBadge}${countLabel}</div>
        </div>
        ${d.description ? `<p class="deck-desc">${escapeHtml(d.description)}</p>` : ''}
        <div class="deck-actions">
          <button class="btn btn-primary btn-sm act-start" data-id="${d.id}">${startLabel}</button>
          <label class="shuffle-toggle" title="Xáo ngẫu nhiên thứ tự và đáp án">
            <input type="checkbox" class="shuffle-cb" data-id="${d.id}" ${shuffleChecked}> 🔀 Xáo
          </label>
          <button class="btn btn-sm btn-danger act-delete" data-id="${d.id}" title="Xoá khỏi thiết bị này">Xoá</button>
          <span style="margin-left:auto; display: flex; gap: 6px; align-items: center;">${statsHTML}</span>
        </div>
      </div>
    `;
  }

  function bindLibraryEvents() {
    const main = document.getElementById('main');

    // Stats panel click — open username editor
    const statsPanel = document.getElementById('stats-panel');
    if (statsPanel) statsPanel.onclick = () => openUsernameModal(false);

    // Leaderboard buttons
    bindLeaderboardEvents();
    startLBPolling();

    // Tabs
    main.querySelectorAll('.tab').forEach(t => t.onclick = () => {
      activeTab = t.dataset.tab;
      activeCategory = null;
      searchQuery = '';
      renderLibrary();
    });

    // Search
    const searchInput = document.getElementById('search-input');
    if (searchInput) {
      let searchTimer;
      searchInput.oninput = (e) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          searchQuery = e.target.value.trim();
          renderLibrary();
          const newInput = document.getElementById('search-input');
          if (newInput) {
            newInput.focus();
            newInput.setSelectionRange(newInput.value.length, newInput.value.length);
          }
        }, 200);
      };
    }
    const searchClear = document.getElementById('search-clear');
    if (searchClear) searchClear.onclick = () => { searchQuery = ''; renderLibrary(); };

    // Category cards
    main.querySelectorAll('.category-card').forEach(c => c.onclick = () => {
      activeCategory = c.dataset.category;
      renderLibrary();
    });

    // Back to category list
    const backCat = document.getElementById('back-to-categories');
    if (backCat) backCat.onclick = () => { activeCategory = null; renderLibrary(); };

    // Deck cards (start + delete)
    main.querySelectorAll('.act-start').forEach(b => b.onclick = e => {
      e.stopPropagation();
      const cb = main.querySelector('.shuffle-cb[data-id="'+b.dataset.id+'"]');
      const shuffle = cb && cb.checked;
      startDeckWithPrompt(b.dataset.id, shuffle);
    });
    main.querySelectorAll('.act-delete').forEach(b => b.onclick = e => {
      e.stopPropagation();
      deleteDeck(b.dataset.id);
    });
    main.querySelectorAll('.shuffle-toggle').forEach(l => l.onclick = e => e.stopPropagation());
    main.querySelectorAll('.deck-card').forEach(c => c.onclick = (e) => {
      // Don't trigger start when clicking on delete button
      if (e.target.closest('.act-delete')) return;
      const cb = c.querySelector('.shuffle-cb');
      const shuffle = cb && cb.checked;
      startDeckWithPrompt(c.dataset.id, shuffle);
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  function deleteDeck(id) {
    const d = decks.find(x => x.id === id);
    if (!d) return;
    const isFromCloud = d.source === 'cloud';
    const msg = isFromCloud
      ? `Xoá bộ "${d.name}" khỏi thiết bị này?\n\nLưu ý: bộ đề này được tải từ cloud — nó vẫn còn trên cloud và sẽ tự động tải lại khi đồng bộ.\nĐể xoá hoàn toàn, hãy xoá trên app host rồi đẩy lên cloud.`
      : `Xoá bộ đề "${d.name}"?`;
    if (!confirm(msg)) return;
    decks = decks.filter(x => x.id !== id);
    saveDecks();
    toast('Đã xoá khỏi thiết bị', 'success');
    renderLibrary();
  }

  function exportDeck(id) {
    const d = decks.find(x => x.id === id);
    if (!d) return;
    const isMcq = (d.type || 'cases') === 'mcq';
    const obj = {
      name: d.name,
      description: d.description,
      level: d.level,
      type: d.type || 'cases',
      category: d.category || 'Chưa phân loại'
    };
    if (isMcq) obj.questions = d.questions;
    else obj.cases = d.cases;
    const blob = new Blob([JSON.stringify(obj, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = d.name.replace(/[^\w\s-]/g,'').replace(/\s+/g,'_').toLowerCase() + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function openPasteModal(categoryOverride) {

    openModal(`

      ${catLabel}
      <textarea class="modal-textarea" id="paste-area" placeholder='{"name":"...","cases":[...]}'></textarea>
      <div class="modal-actions" style="margin-top: 12px;">
        <button class="btn" id="paste-cancel">Huỷ</button>
        <button class="btn btn-primary" id="paste-import">Nhập</button>
      </div>
    `);
