  // ─── Mock exam generation ────────────────────────────────────────
  function generateMockExam(selectedDecks) {
    const name = (mockState.name || '').trim() || `Đề thi thử ${new Date().toLocaleDateString('vi-VN')}`;
    if (!mockState.timeMinutes || mockState.timeMinutes < 1) {
      toast('Thời gian phải ≥ 1 phút', 'error'); return null;
    }
    const caseDecks = selectedDecks.filter(d => (d.type || 'cases') === 'cases');
    const mcqDecks = selectedDecks.filter(d => (d.type || 'cases') === 'mcq');

    const mixedItems = []; // array of question units
    if (mockState.structure === 'per-deck') {
      // Sample N case-units from each case deck, M questions from each MCQ deck
      caseDecks.forEach(d => {
        const numToTake = Math.min(mockState.perDeckCases, d.cases.length);
        const sampled = sampleArray(d.cases, numToTake);
        sampled.forEach(c => {
          mixedItems.push({
            kind: 'case',
            caseTitle: c.title,
            caseBody: c.body,
            questions: c.questions.map(q => ({
              q: q.q, options: q.options, answer: q.answer, explain: q.explain,
              type: q.type
            }))
          });
        });
      });
      mcqDecks.forEach(d => {
        const numToTake = Math.min(mockState.perDeckMcq, d.questions.length);
        const sampled = sampleArray(d.questions, numToTake);
        sampled.forEach(q => {
          mixedItems.push({
            kind: 'standalone',
            q: q.q, options: q.options, answer: q.answer, explain: q.explain,
            type: q.type
          });
        });
      });
    } else {
      // Total questions mode — N = total ATOMIC questions
      // Algorithm: build a pool of all units (case = 1 unit weighted by its atomic count;
      // MCQ question = 1 unit weighted 1). Shuffle pool, take in order, stop when
      // cumulative atomic count >= N. No deck-coverage constraint — some decks may not
      // appear if N is small relative to total available units.
      const N = mockState.totalQuestions;
      const allDecks = [...caseDecks, ...mcqDecks];
      if (allDecks.length === 0) { toast('Không có bộ nào được chọn', 'error'); return null; }

      // Build pool — each entry is a unit (case or standalone)
      const pool = [];
      allDecks.forEach(d => {
        if ((d.type || 'cases') === 'mcq') {
          d.questions.forEach(q => {
            pool.push({
              kind: 'standalone',
              weight: 1,
              data: q
            });
          });
        } else {
          d.cases.forEach(c => {
            pool.push({
              kind: 'case',
              weight: c.questions.length,
              data: c
            });
          });
        }
      });

      // Shuffle pool, take until cumulative atomic >= N
      const shuffledPool = shuffleArray(pool);
      let acc = 0;
      for (const entry of shuffledPool) {
        if (acc >= N) break;
        if (entry.kind === 'standalone') {
          const q = entry.data;
          mixedItems.push({
            kind: 'standalone',
            q: q.q, options: q.options, answer: q.answer, explain: q.explain,
            type: q.type
          });
        } else {
          const c = entry.data;
          mixedItems.push({
            kind: 'case',
            caseTitle: c.title,
            caseBody: c.body,
            questions: c.questions.map(q => ({
              q: q.q, options: q.options, answer: q.answer, explain: q.explain,
              type: q.type
            }))
          });
        }
        acc += entry.weight;
      }
    }

    if (mixedItems.length === 0) {
      toast('Không có câu nào được rút. Kiểm tra lại cài đặt.', 'error');
      return null;
    }

    // Shuffle units order
    const shuffledItems = shuffleArray(mixedItems);

    // Compute total atomic questions
    const totalAtomic = shuffledItems.reduce((sum, item) => {
      if (item.kind === 'case') return sum + item.questions.length;
      return sum + 1;
    }, 0);

    // Determine deck type
    const hasCase = shuffledItems.some(i => i.kind === 'case');
    const hasStandalone = shuffledItems.some(i => i.kind === 'standalone');
    const deckType = hasCase ? 'mixed' : 'mcq';

    // Create a deck entry
    const newDeck = {
      id: 'mock_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      name: name,
      description: `Đề thi thử (${shuffledItems.length} đơn vị · ${totalAtomic} câu)`,
      level: '',
      type: deckType,
      category: '📝 Đề thi thử',
      mockExam: true,
      timeLimit: mockState.timeMinutes * 60,
      mixedItems: shuffledItems,
      totalQuestions: totalAtomic,
      addedAt: Date.now(),
      bestScore: null,
      localOnly: true
    };
    // For backward-compat shape, also expose cases or questions for renderDeckCard count display
    if (hasCase) {
      newDeck.cases = shuffledItems
        .filter(i => i.kind === 'case')
        .map(i => ({ title: i.caseTitle, body: i.caseBody, questions: i.questions }));
    }
    if (hasStandalone) {
      newDeck.questions = shuffledItems
        .filter(i => i.kind === 'standalone')
        .map(i => ({ q: i.q, options: i.options, answer: i.answer, explain: i.explain, type: i.type }));
    }
    decks.push(newDeck);
    saveDecks();
    return newDeck;
  }

  // Sample n items randomly from arr (without replacement)
  function sampleArray(arr, n) {
    if (n >= arr.length) return arr.slice();
    const copy = arr.slice();
    const result = [];
    for (let i = 0; i < n; i++) {
      const idx = Math.floor(Math.random() * copy.length);
      result.push(copy[idx]);
      copy.splice(idx, 1);
    }
    return result;
  }

  function navigateToQuestion(caseIdx, qIdx) {
    qstate.caseIdx = caseIdx;
    qstate.qIdx = qIdx;
    qstate.selected = null;
    qstate.multiSelected = [];
    saveProgress();
    renderQuiz();
  }

  function navigateBack() {
    // Go to previous case (last question of it). If we're in mcq-mode, just previous question.
    if (qstate.isMcq) {
      // Previous question
      if (qstate.qIdx > 0) {
        navigateToQuestion(qstate.caseIdx, qstate.qIdx - 1);
      } else if (qstate.caseIdx > 0) {
        const prev = qstate.runtimeCases[qstate.caseIdx - 1];
        navigateToQuestion(qstate.caseIdx - 1, prev.questions.length - 1);
      }
    } else {
      // Case mode: go to previous case (last question of it)
      if (qstate.caseIdx > 0) {
        const prev = qstate.runtimeCases[qstate.caseIdx - 1];
        navigateToQuestion(qstate.caseIdx - 1, prev.questions.length - 1);
      } else if (qstate.qIdx > 0) {
        navigateToQuestion(qstate.caseIdx, qstate.qIdx - 1);
      }
    }
  }

  function navigateSkip() {
    // MCQ mode only — skip current question
    if (qstate.qIdx < qstate.runtimeCases[qstate.caseIdx].questions.length - 1) {
      navigateToQuestion(qstate.caseIdx, qstate.qIdx + 1);
    } else if (qstate.caseIdx < qstate.runtimeCases.length - 1) {
      navigateToQuestion(qstate.caseIdx + 1, 0);
    }
  }

  function navigateSkipCase() {
    // Case mode: jump to next case
    if (qstate.caseIdx < qstate.runtimeCases.length - 1) {
      navigateToQuestion(qstate.caseIdx + 1, 0);
    }
  }

  function navigateNext() {
    // After answering, go to next question/case
    const cases = qstate.runtimeCases;
    if (qstate.qIdx < cases[qstate.caseIdx].questions.length - 1) {
      navigateToQuestion(qstate.caseIdx, qstate.qIdx + 1);
    } else if (qstate.caseIdx < cases.length - 1) {
      navigateToQuestion(qstate.caseIdx + 1, 0);
    } else {
      // Last question — but only finish if all answered
      const totalAnswered = qstate.perCase.reduce((sum, arr) =>
        sum + arr.filter(x => x !== null).length, 0);
      if (totalAnswered === qstate.totalQ) {
        finishQuiz();
      } else {
        // Find first unanswered question
        for (let ci = 0; ci < qstate.runtimeCases.length; ci++) {
          for (let qi = 0; qi < qstate.perCase[ci].length; qi++) {
            if (qstate.perCase[ci][qi] === null) {
              navigateToQuestion(ci, qi);
              return;
            }
          }
        }
      }
    }
  }

  function finishQuiz() {
    qstate.finished = true;
    stopExamTimer();
    if (qstate.wrongRetryMode) {
      renderQuiz();
      return;
    }
    const d = decks.find(x => x.id === activeDeckId);
    const finalPct = Math.round(100*qstate.correct/qstate.totalQ);
    if (d.bestScore == null || finalPct > d.bestScore) {
      d.bestScore = finalPct;
    }
    saveSession(d.id, d.name, finalPct, qstate.totalQ, qstate.correct);
    if (d.progress) delete d.progress;
    saveDecks();
    renderQuiz();
  }

  function renderFinal() {
    const d = decks.find(x => x.id === activeDeckId);
    const pct = Math.round(100*qstate.correct/qstate.totalQ);
    let msg, color;
    if (pct >= 85) { msg = 'Xuất sắc — bạn đã nắm rất chắc bộ kiến thức này.'; color = 'var(--success)'; }
    else if (pct >= 70) { msg = 'Khá tốt — phần lớn kiến thức đã vững. Hãy xem lại các câu sai để củng cố.'; color = 'var(--info)'; }
    else if (pct >= 50) { msg = 'Trung bình — cần ôn lại các chủ đề còn yếu.'; color = 'var(--warning)'; }
    else { msg = 'Cần ôn tập kỹ lưỡng. Hãy đọc lại tài liệu và làm lại sau.'; color = 'var(--danger)'; }

    document.getElementById('main').innerHTML = `
      <div class="final">
        <div class="final-label">Kết quả tổng kết</div>
        <div class="final-score" style="color:${color}">${pct}%</div>
        <div class="final-label">${qstate.correct} / ${qstate.totalQ} câu đúng${d.bestScore === pct && qstate.correct === qstate.totalQ * pct/100 ? ' · Điểm cao mới!' : ''}</div>
        <div class="final-msg">${msg}</div>
        <div class="final-buttons">
          <button class="btn btn-primary" id="retry">↻ Làm lại</button>
          <button class="btn" id="back-to-lib">Về thư viện</button>
        </div>
      </div>
    `;
    document.getElementById('retry').onclick = () => startDeck(activeDeckId, qstate.shuffle);
    document.getElementById('back-to-lib').onclick = renderLibrary;
  }

  // ─── File input ───────────────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files.length) {
      const targetCategory = e.target.dataset.targetCategory || '';
      importFromFile(e.target.files[0], targetCategory || null);
      e.target.value = ''; // reset
      e.target.dataset.targetCategory = '';
    }
  });

  // ─── Init ─────────────────────────────────────────────────────────
  loadDecks();
  // Clean up any leaderboard config left from a prior version
  localStorage.removeItem('quiz_client_lb_config');
  renderLibrary();
  // Prompt for username on first launch (before auto-sync to avoid stacking modals)
  if (!getUsername()) {
    setTimeout(() => openUsernameModal(true), 100);
  } else {
    // Auto-sync from cloud if URL is saved
    const savedCloudUrl = localStorage.getItem(CLOUD_URL_KEY);
    if (savedCloudUrl) {
      setTimeout(async () => {
        try {
          toast('Đang đồng bộ từ cloud...', '');
          await syncFromCloud(savedCloudUrl, true, () => {});
          toast('✓ Đã đồng bộ từ cloud', 'success');
          renderLibrary();
        } catch(e) {
          toast('⚠ Không đồng bộ được: ' + e.message, 'error');
        }
      }, 100);
    }
  }
})();
</script>
</body>
</html>
